# Tosino — nexus001.vip
#
# DNS
#   nexus001.vip, www — 메인(관리자) + API (같은 호스트, 경로로 분리)
#   demo1.nexus001.vip, demo2.nexus001.vip — 솔루션(향후 플랫폼별로 추가)
#
# 백엔드(포트는 systemd/PM2 등에서 맞춤)
#   관리자 admin-web   next start -p 3000  → 127.0.0.1:3000
#   솔루션 solution-web next start -p 3002 → 127.0.0.1:3002  (데모 호스트 공용)
#   API Nest           :4001               → 127.0.0.1:4001
#
# Nest는 /api 접두사(auth·platforms·public 등). /health·/webhooks·/webhook/vinus·/uploads 는 루트.
# Vinus 콜백 정식 경로: POST /webhooks/vinus (복수). /webhook/vinus 는 흔한 오타 호환.
#
# 환경 변수
#   apps/api/.env
#     PUBLIC_API_URL=https://nexus001.vip
#   admin-web / solution-web / agent-web 빌드 시
#     NEXT_PUBLIC_API_URL=https://nexus001.vip/api
#
# 인증서: apex + 데모 서브도메인을 한 번에
#   sudo certbot certonly --nginx -d nexus001.vip -d www.nexus001.vip \
#     -d demo1.nexus001.vip -d demo2.nexus001.vip
#   또는 와일드카드: -d nexus001.vip -d *.nexus001.vip  (DNS challenge)
#
# 서버에 적용 (저장소 루트에서) — 기존 default 등과 충돌 시:
#   sudo bash scripts/nginx-migrate-to-tosino.sh http
# 단순 링크만:
#   sudo bash scripts/nginx-enable-tosino.sh http
# SSL: conf 안 경로는 live/nexus001.vip 기준. certbot 폴더명이 다르면:
#   sudo bash scripts/nginx-enable-tosino.sh https 실제폴더명
# 인증서 없을 때: sudo bash scripts/nginx-enable-tosino.sh http
# 수동: sudo ln -sf /절대경로/tosino/deploy/nginx/nexus001.vip.conf /etc/nginx/sites-enabled/tosino-nexus001.vip.conf
#       sudo nginx -t && sudo systemctl reload nginx
# 로컬에서 가상 호스트 검증(서버에서):
#   curl -sk --resolve nexus001.vip:443:127.0.0.1 https://nexus001.vip/health
# /health 는 반드시 **nexus001.vip 또는 www** 로 요청 (IP 직접 접속은 server_name 불일치로 다른 server 블록/404 가능)

upstream tosino_admin {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream tosino_api {
    server 127.0.0.1:4001;
    keepalive 32;
}

upstream tosino_solution {
    server 127.0.0.1:3002;
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name nexus001.vip www.nexus001.vip demo1.nexus001.vip demo2.nexus001.vip;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTP 로 /health (레거시 server 와 섞일 때·헬스체크용). 없으면 80 이 옛 설정으로 404 날 수 있음.
    location = /health {
        proxy_pass http://tosino_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /webhook/vinus {
        proxy_pass http://tosino_api/webhooks/vinus;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 메인: 관리자(/) + API(/api, /health, /webhooks, /uploads)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nexus001.vip www.nexus001.vip;

    # 폴더명은 certbot 과 일치해야 함 (다르면 nginx-enable-tosino.sh https 폴더명)
    ssl_certificate     /etc/letsencrypt/live/nexus001.vip/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexus001.vip/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://tosino_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://tosino_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /webhooks/ {
        proxy_pass http://tosino_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /webhook/vinus {
        proxy_pass http://tosino_api/webhooks/vinus;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://tosino_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://tosino_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# 솔루션: 호스트별 플랫폼 매칭(demo1, demo2 … server_name 에 추가)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name demo1.nexus001.vip demo2.nexus001.vip;

    # 폴더명은 certbot 과 일치해야 함 (다르면 nginx-enable-tosino.sh https 폴더명)
    ssl_certificate     /etc/letsencrypt/live/nexus001.vip/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexus001.vip/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    # 솔루션 호스트에서도 API 헬스 확인 (없으면 Next 가 /health 를 404 처리함)
    location = /health {
        proxy_pass http://tosino_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://tosino_solution;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
